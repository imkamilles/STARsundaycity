          { id: "cf12", name: "Van", stars: 4, icon: "🚐" }
        ]
      },
      "Tapete Vermelho": {
        reward: "17M", color: "from-red-600 to-yellow-600",
        cards: [
          { id: "tv1", name: "Poder Estrelas", stars: 4, icon: "⭐" },
          { id: "tv2", name: "Boa Chique", stars: 4, icon: "🧣" },
          { id: "tv3", name: "Somente VIP", stars: 4, icon: "🎟️" },
          { id: "tv4", name: "Passe VIP", stars: 4, icon: "🪪" },
          { id: "tv5", name: "Colar", stars: 4, icon: "📿" },
          { id: "tv6", name: "Bolsa Clutch", stars: 4, icon: "👛" },
          { id: "tv7", name: "Vinho Fino", stars: 4, icon: "🍷" },
          { id: "tv8", name: "Crachá Imprensa", stars: 4, icon: "🎤" },
          { id: "tv9", name: "Vestido Noturno", stars: 4, icon: "👗" },
          { id: "tv10", name: "Smoking", stars: 4, icon: "👔" },
          { id: "tv11", name: "Brincos", stars: 4, icon: "💎" },
          { id: "tv12", name: "Prêmio de Elite", stars: 4, icon: "🏆" }
        ]
      }
    };

    function App() {
      const [currentUserProfile, setCurrentUserProfile] = useState(null);
      const [usernameInput, setUsernameInput] = useState('');
      const [ingameNameInput, setIngameNameInput] = useState('');
      const [gameTagInput, setGameTagInput] = useState('');
      const [selectedAvatar, setSelectedAvatar] = useState('pink_sailor');
      const [groupProfiles, setGroupProfiles] = useState({});
      const [activeAlbum, setActiveAlbum] = useState("Tem Ritmo?");
      const [filterType, setFilterType] = useState("all"); 
      const [notification, setNotification] = useState(null);
      const [selectedUserToInspect, setSelectedUserToInspect] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [isEditingProfile, setIsEditingProfile] = useState(false);
      const [inspectedCardRepetitions, setInspectedCardRepetitions] = useState(null);

      useEffect(() => {
        if (isFirebaseActive) {
          window.FirebaseLib.getAuth().onAuthStateChanged((usr) => {
            if (usr) {
              const savedName = localStorage.getItem('stars_username');
              const savedIngame = localStorage.getItem('stars_ingame') || '';
              const savedTag = localStorage.getItem('stars_tag') || '';
              const savedAvatarId = localStorage.getItem('stars_avatar') || 'pink_sailor';
              if (savedName) {
                setUsernameInput(savedName);
                setIngameNameInput(savedIngame);
                setGameTagInput(savedTag);
                setSelectedAvatar(savedAvatarId);
                handleRegisterUser(savedName, savedIngame, savedTag, savedAvatarId, usr.uid);
              }
            } else {
              window.FirebaseLib.signInAnonymously(window.FirebaseLib.getAuth());
            }
          });
        } else {
          const savedLocalProfile = localStorage.getItem('local_profile');
          if (savedLocalProfile) {
            const parsed = JSON.parse(savedLocalProfile);
            setCurrentUserProfile(parsed);
            setGroupProfiles({ 'local-user': parsed });
          }
        }
      }, []);

      useEffect(() => {
        if (!isFirebaseActive) return;
        const groupCollectionRef = window.FirebaseLib.collection(db, 'artifacts', appId, 'public', 'data', 'users');
        
        const unsubscribe = window.FirebaseLib.onSnapshot(groupCollectionRef, (snapshot) => {
          const profiles = {};
          snapshot.forEach((doc) => {
            profiles[doc.id] = doc.data();
          });
          setGroupProfiles(profiles);

          const curUser = window.FirebaseLib.getAuth().currentUser;
          if (curUser && profiles[curUser.uid]) {
            const p = profiles[curUser.uid];
            setCurrentUserProfile(p);
            if (!isEditingProfile) {
              setUsernameInput(p.username || '');
              setIngameNameInput(p.ingameName || '');
              setGameTagInput(p.gameTag || '');
              setSelectedAvatar(p.avatarId || 'pink_sailor');
            }
          }
        });
        return () => unsubscribe();
      }, [isEditingProfile]);

      const showNotification = (message) => {
        setNotification(message);
        setTimeout(() => setNotification(null), 3000);
      };

      const copyToClipboard = (text) => {
        navigator.clipboard.writeText(text);
        showNotification("Copiado com sucesso! 📋");
      };

      const handleRegisterUser = async (name = usernameInput, ingame = ingameNameInput, tag = gameTagInput, avatar = selectedAvatar, customUid = null) => {
        if (!name.trim()) return;
        const uid = isFirebaseActive ? (customUid || window.FirebaseLib.getAuth().currentUser?.uid) : 'local-user';
        if (!uid) return;

        const initialCards = { ...(currentUserProfile?.cards || {}) };
        Object.keys(ALBUMS_DATA).forEach(albumName => {
          ALBUMS_DATA[albumName].cards.forEach(card => {
            if (initialCards[card.id] === undefined) initialCards[card.id] = 0; 
          });
        });

        const newProfile = {
          uid,
          username: name.trim(),
          ingameName: ingame.trim(),
          gameTag: tag.trim(),
          avatarId: avatar,
          cards: initialCards,
          updatedAt: Date.now()
        };

        if (isFirebaseActive) {
          const userDocRef = window.FirebaseLib.doc(db, 'artifacts', appId, 'public', 'data', 'users', uid);
          await window.FirebaseLib.setDoc(userDocRef, newProfile, { merge: true });
        } else {
          localStorage.setItem('local_profile', JSON.stringify(newProfile));
          setCurrentUserProfile(newProfile);
          setGroupProfiles({ 'local-user': newProfile });
        }

        localStorage.setItem('stars_username', name.trim());
        localStorage.setItem('stars_ingame', ingame.trim());
        localStorage.setItem('stars_tag', tag.trim());
        localStorage.setItem('stars_avatar', avatar);
        setIsEditingProfile(false);
        showNotification("Perfil guardado na Cloud! ✨");
      };

      const handleUpdateCardCount = async (cardId, delta) => {
        if (!currentUserProfile) return;
        const currentCount = currentUserProfile.cards?.[cardId] || 0;
        const newCount = Math.max(0, currentCount + delta);

        if (isFirebaseActive) {
          const uid = window.FirebaseLib.getAuth().currentUser?.uid;
          const userDocRef = window.FirebaseLib.doc(db, 'artifacts', appId, 'public', 'data', 'users', uid);
          await window.FirebaseLib.updateDoc(userDocRef, { [`cards.${cardId}`]: newCount, updatedAt: Date.now() });
        } else {
          const updated = { ...currentUserProfile, cards: { ...currentUserProfile.cards, [cardId]: newCount } };
          localStorage.setItem('local_profile', JSON.stringify(updated));
          setCurrentUserProfile(updated);
          setGroupProfiles({ 'local-user': updated });
        }
      };

      const handleSetCardCount = async (cardId, count) => {
        if (!currentUserProfile) return;
        const value = Math.max(0, parseInt(count) || 0);

        if (isFirebaseActive) {
          const uid = window.FirebaseLib.getAuth().currentUser?.uid;
          const userDocRef = window.FirebaseLib.doc(db, 'artifacts', appId, 'public', 'data', 'users', uid);
          await window.FirebaseLib.updateDoc(userDocRef, { [`cards.${cardId}`]: value, updatedAt: Date.now() });
        } else {
          const updated = { ...currentUserProfile, cards: { ...currentUserProfile.cards, [cardId]: value } };
          localStorage.setItem('local_profile', JSON.stringify(updated));
          setCurrentUserProfile(updated);
          setGroupProfiles({ 'local-user': updated });
        }
      };

      const handleDeleteAccount = async () => {
        const confirmed = window.confirm("⚠️ EXCLUIR CONTA DEFINITIVAMENTE?\nEsta ação apagará todo o seu progresso de cartas do servidor do grupo!");
        if (!confirmed) return;

        const uid = isFirebaseActive ? window.FirebaseLib.getAuth().currentUser?.uid : 'local-user';
        if (!uid) return;

        try {
          if (isFirebaseActive) {
            const userDocRef = window.FirebaseLib.doc(db, 'artifacts', appId, 'public', 'data', 'users', uid);
            await window.FirebaseLib.deleteDoc(userDocRef);
          }
          
          localStorage.removeItem('stars_username');
          localStorage.removeItem('stars_ingame');
          localStorage.removeItem('stars_tag');
          localStorage.removeItem('stars_avatar');
          localStorage.removeItem('local_profile');
          
          setCurrentUserProfile(null);
          setUsernameInput('');
          setIngameNameInput('');
          setGameTagInput('');
          setSelectedAvatar('pink_sailor');
          setIsEditingProfile(false);
          
          showNotification("Sua conta foi completamente removida.");
        } catch (e) {
          showNotification("Erro ao excluir. Tente novamente.");
        }
      };

      const getRepetitionsForCard = (cardId) => {
        return Object.values(groupProfiles)
          .filter(p => (p.cards?.[cardId] || 0) > 1)
          .map(p => ({
            username: p.username,
            ingameName: p.ingameName,
            gameTag: p.gameTag,
            avatarId: p.avatarId || 'pink_sailor',
            qty: p.cards[cardId] - 1
          }));
      };

      const getMatches = () => {
        const matches = [];
        const uids = Object.keys(groupProfiles);
        uids.forEach(donorUid => {
          const donor = groupProfiles[donorUid];
          uids.forEach(receiverUid => {
            if (donorUid === receiverUid) return;
            const receiver = groupProfiles[receiverUid];
            Object.keys(ALBUMS_DATA).forEach(albumName => {
              ALBUMS_DATA[albumName].cards.forEach(card => {
                if ((donor.cards?.[card.id] || 0) > 1 && (receiver.cards?.[card.id] || 0) === 0) {
                  matches.push({
                    donor: donor.username,
                    donorIngame: donor.ingameName || donor.username,
                    donorTag: donor.gameTag || '',
                    donorAvatar: donor.avatarId || 'pink_sailor',
                    receiver: receiver.username,
                    cardName: card.name,
                    album: albumName
                  });
                }
              });
            });
          });
        });
        return matches;
      };

      const getUserStats = (profile) => {
        if (!profile || !profile.cards) return { owned: 0, total: 0, percent: 0, repeats: 0 };
        let owned = 0, totalCards = 0, repeats = 0;
        Object.keys(ALBUMS_DATA).forEach(albumName => {
          ALBUMS_DATA[albumName].cards.forEach(card => {
            totalCards++;
            const qty = profile.cards[card.id] || 0;
            if (qty > 0) owned++;
            if (qty > 1) repeats += (qty - 1);
          });
        });
        return { owned, total: totalCards, percent: Math.round((owned / totalCards) * 100), repeats };
      };

      const getUserAlbumProgress = (profile, albumName) => {
        if (!profile || !profile.cards) return { owned: 0, total: 12, percent: 0 };
        let owned = 0;
        ALBUMS_DATA[albumName].cards.forEach(c => {
          if ((profile.cards[c.id] || 0) > 0) owned++;
        });
        return { owned, total: 12, percent: Math.round((owned / 12) * 100) };
      };

      const getAvatarSvg = (id) => AVATARS_LIST.find(a => a.id === id)?.svg || AVATARS_LIST[0].svg;
      const getAvatarColor = (id) => AVATARS_LIST.find(a => a.id === id)?.color || "from-pink-500 to-rose-700";

      const matches = getMatches();
      const sortedUsers = Object.values(groupProfiles).sort((a, b) => getUserStats(b).percent - getUserStats(a).percent);

      return (
        <div className="min-h-screen bg-slate-950 pb-12">
          {/* Header */}
          <header className="bg-gradient-to-b from-purple-950 via-slate-900 to-slate-950 border-b border-pink-500/10 p-6">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
              <div>
                <span className="bg-yellow-400 text-black text-[9px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider">
                  ⚡ CLÃ BRG ONLINE
                </span>
                <h1 className="text-3xl font-black bg-gradient-to-r from-yellow-300 via-pink-400 to-purple-400 bg-clip-text text-transparent mt-2">
                  BRG Brazilian Girls
                </h1>
                <p className="text-xs text-slate-400">Banco de Dados e Sincronização de Cartas entre Integrantes</p>
                {!isFirebaseActive && (
                  <p className="text-orange-400 text-[11px] mt-1 font-bold">⚠️ Modo Offline Ativo. Conecte o seu Firebase para sincronizar com as outras meninas!</p>
                )}
              </div>

              {/* Box de Perfil */}
              <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl w-full md:w-80 shadow-xl">
                {currentUserProfile && !isEditingProfile ? (
                  <div className="space-y-3">
                    <div className="flex justify-between items-center text-[10px]">
                      <span className="text-pink-400 font-bold uppercase tracking-widest">Meu Perfil</span>
                      <div className="flex gap-2">
                        <button onClick={() => setIsEditingProfile(true)} className="text-slate-400 hover:text-white">✏️ Editar</button>
                        <button onClick={handleDeleteAccount} className="text-red-400 hover:text-red-300">🗑️ Excluir Conta</button>
                      </div>
                    </div>
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-xl overflow-hidden shadow-lg border border-white/10">
                        {getAvatarSvg(currentUserProfile.avatarId)}
                      </div>
                      <div>
                        <div className="font-bold text-white text-sm">{currentUserProfile.username}</div>
                        <div className="text-[11px] text-slate-400">Nick: <span className="text-yellow-400 font-bold">{currentUserProfile.ingameName || '-'}</span></div>
                      </div>
                    </div>
                    {currentUserProfile.gameTag && (
                      <div onClick={() => copyToClipboard(currentUserProfile.gameTag)} className="bg-slate-950 p-2 rounded-lg text-[10px] text-center font-mono cursor-pointer border border-slate-850 text-pink-300 hover:bg-slate-900">
                        ID: {currentUserProfile.gameTag} 📋
                      </div>
                    )}
                    <div className="w-full bg-slate-950 h-1.5 rounded-full overflow-hidden">
                      <div className="bg-pink-500 h-full" style={{ width: `${getUserStats(currentUserProfile).percent}%` }}></div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-2.5">
                    <span className="text-[10px] text-pink-400 font-bold uppercase block">Entrar no Grupo</span>
                    <div className="flex gap-1 overflow-x-auto pb-1 scrollbar-none">
                      {AVATARS_LIST.map(av => (
                        <button key={av.id} onClick={() => setSelectedAvatar(av.id)} className={`w-8 h-8 shrink-0 rounded-lg overflow-hidden border ${selectedAvatar === av.id ? 'border-pink-500 scale-105' : 'border-transparent opacity-60'}`}>
                          {av.svg}
                        </button>
                      ))}
                    </div>
                    <input type="text" placeholder="Teu Nome (WhatsApp)" value={usernameInput} onChange={e => setUsernameInput(e.target.value)} className="w-full bg-slate-950 border border-slate-800 text-xs rounded-xl p-2 text-white outline-none" />
                    <div className="grid grid-cols-2 gap-1.5">
                      <input type="text" placeholder="Nick no Jogo" value={ingameNameInput} onChange={e => setIngameNameInput(e.target.value)} className="w-full bg-slate-950 border border-slate-800 text-xs rounded-xl p-2 text-white outline-none" />
                      <input type="text" placeholder="ID de Amigo" value={gameTagInput} onChange={e => setGameTagInput(e.target.value)} className="w-full bg-slate-950 border border-slate-800 text-xs rounded-xl p-2 text-white outline-none" />
                    </div>
                    <button onClick={() => handleRegisterUser()} className="w-full bg-gradient-to-r from-pink-600 to-purple-600 py-1.5 rounded-xl text-xs font-bold text-white">
                      Confirmar e Entrar
                    </button>
                  </div>
                )}
              </div>
            </div>
          </header>

          {/* Grid Principal */}
          <main className="max-w-7xl mx-auto px-4 mt-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
            {/* Esquerda */}
            <div className="lg:col-span-4 space-y-6">
              {/* Pesquisa */}
              <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                <input type="text" placeholder="🔍 Procurar carta no Clã..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-xs text-white outline-none" />
                {searchQuery && (
                  <div className="mt-2 space-y-1 max-h-32 overflow-y-auto">
                    {Object.entries(ALBUMS_DATA).flatMap(([alb, d]) => d.cards.map(c => ({...c, alb}))).filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase())).map(c => (
                      <div key={c.id} onClick={() => setInspectedCardRepetitions({ id: c.id, name: c.name })} className="bg-slate-950 p-2 rounded-lg text-xs cursor-pointer border border-slate-850 flex justify-between">
                        <span>{c.name}</span> <span className="text-pink-400 text-[10px]">{c.alb}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Lista Integrantes */}
              <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                <h3 className="text-xs font-bold uppercase text-slate-400 mb-2">Integrantes do Clã ({sortedUsers.length})</h3>
                <div className="space-y-1.5 max-h-48 overflow-y-auto">
                  {sortedUsers.map(p => (
                    <div key={p.uid} onClick={() => setSelectedUserToInspect(selectedUserToInspect?.uid === p.uid ? null : p)} className="bg-slate-950 p-2.5 rounded-xl text-xs border border-slate-850 cursor-pointer flex justify-between items-center">
                      <span className="font-bold flex items-center gap-2">
                        <span className="w-6 h-6 rounded-md overflow-hidden">{getAvatarSvg(p.avatarId)}</span> {p.username}
                      </span>
                      <span className="text-slate-400 font-mono font-bold">{getUserStats(p).percent}%</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Painel de Matches Rápidos */}
              <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                <h3 className="text-xs font-bold uppercase text-slate-400 mb-2">🤝 Matches de Troca</h3>
                <div className="space-y-2 max-h-48 overflow-y-auto">
                  {matches.map((m, idx) => (
                    <div key={idx} className="bg-slate-950 p-2.5 rounded-xl text-[11px] border border-slate-900 flex items-center gap-2">
                      <span className="w-6 h-6 shrink-0 rounded-md overflow-hidden">{getAvatarSvg(m.donorAvatar)}</span>
                      <span>
                        <span className="text-emerald-400 font-bold">{m.donor}</span> tem repetida de <strong>"{m.cardName}"</strong> para doar a <span className="text-pink-400 font-bold">{m.receiver}</span>.
                      </span>
                    </div>
                  ))}
                  {matches.length === 0 && <p className="text-xs text-slate-500 italic text-center">Nenhum match encontrado ainda.</p>}
                </div>
              </div>
            </div>

            {/* Direita (Álbuns e Cartas) */}
            <div className="lg:col-span-8 space-y-4">
              <div className="bg-slate-900 p-2 rounded-xl flex gap-2 overflow-x-auto scrollbar-none">
                {Object.keys(ALBUMS_DATA).map(alb => (
                  <button key={alb} onClick={() => setActiveAlbum(alb)} className={`px-4 py-2 rounded-lg font-bold text-xs shrink-0 whitespace-nowrap ${activeAlbum === alb ? 'bg-pink-600 text-white' : 'bg-slate-950 text-slate-400'}`}>
                    {alb}
                  </button>
                ))}
              </div>

              <div className="bg-slate-900 p-4 rounded-2xl grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                {ALBUMS_DATA[activeAlbum].cards.map(card => {
                  const qty = currentUserProfile ? (currentUserProfile.cards?.[card.id] || 0) : 0;
                  return (
                    <div key={card.id} onClick={() => setInspectedCardRepetitions({ id: card.id, name: card.name })} className={`p-3 rounded-xl border relative flex flex-col justify-between aspect-[3/4] cursor-pointer ${qty > 0 ? 'bg-slate-850 border-slate-700' : 'bg-slate-950 border-slate-900 opacity-40'}`}>
                      {qty > 1 && <span className="absolute -top-1 -right-1 bg-emerald-500 text-white font-black text-[9px] px-1.5 rounded-md">+{qty - 1}</span>}
                      <div className="flex justify-between text-[9px] text-slate-500">
                        <span className="text-yellow-400">{'★'.repeat(card.stars)}</span>
                        <span>{card.id.toUpperCase()}</span>
                      </div>
                      <div className="text-center text-3xl my-2">{card.icon}</div>
                      <div className="space-y-1 text-center" onClick={e => e.stopPropagation()}>
                        <p className="text-[11px] font-bold text-slate-200 truncate">{card.name}</p>
                        {currentUserProfile && (
                          <div className="flex items-center justify-between bg-slate-950 rounded-lg p-0.5 border border-slate-850">
                            <button onClick={() => handleUpdateCardCount(card.id, -1)} className="w-4 h-4 text-xs font-bold bg-slate-900">-</button>
                            <span className="text-xs font-bold text-white px-1">{qty}</span>
                            <button onClick={() => handleUpdateCardCount(card.id, 1)} className="w-4 h-4 text-xs font-bold bg-pink-600">+</button>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </main>

          {/* Modal do Detetive de Repetidas */}
          {inspectedCardRepetitions && (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-sm w-full p-5 space-y-3">
                <h4 className="font-bold text-white text-sm">Quem tem a carta: <span className="text-pink-400">"{inspectedCardRepetitions.name}"</span>?</h4>
                <div className="space-y-2 max-h-48 overflow-y-auto">
                  {getRepetitionsForCard(inspectedCardRepetitions.id).map((don, idx) => (
                    <div key={idx} className="bg-slate-950 p-2 rounded-xl text-xs border border-slate-850 flex justify-between items-center">
                      <span className="flex items-center gap-2">
                        <span className="w-6 h-6 rounded-md overflow-hidden">{getAvatarSvg(don.avatarId)}</span>
                        <span><strong>{don.username}</strong> (Sobra: {don.qty})</span>
                      </span>
                      {don.gameTag && <button onClick={() => copyToClipboard(don.gameTag)} className="bg-pink-600 text-[10px] px-2 py-0.5 rounded text-white">Copiar ID</button>}
                    </div>
                  ))}
                  {getRepetitionsForCard(inspectedCardRepetitions.id).length === 0 && <p className="text-xs text-slate-500 italic text-center py-2">Ninguém marcou repetida desta carta ainda.</p>}
                </div>
                <button onClick={() => setInspectedCardRepetitions(null)} className="w-full bg-slate-950 py-2 rounded-xl text-xs text-slate-400 font-bold">Fechar</button>
              </div>
            </div>
          )}

          {/* Notificação Temporária */}
          {notification && (
            <div className="fixed bottom-4 right-4 bg-purple-900 text-white px-4 py-2.5 rounded-xl text-xs font-bold shadow-2xl border border-pink-500">
              {notification}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
