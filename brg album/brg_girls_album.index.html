<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRG Stars - Álbum de Cartas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a0b2e 0%, #090314 100%);
            min-height: 100vh;
        }
        .font-luxury {
            font-family: 'Cinzel', serif;
        }
        .card-glow {
            transition: all 0.3s ease;
        }
        .card-glow:hover {
            box-shadow: 0 0 25px rgba(217, 70, 239, 0.4);
            border-color: rgba(217, 70, 239, 0.7);
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="text-gray-100 antialiased selection:bg-purple-500 selection:text-white">

    <div id="root"></div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, increment } from "firebase/firestore";
        
        // Disponibiliza o Firebase globalmente para o script do React
        window.FirebaseLib = { initializeApp, getFirestore, collection, addDoc, getDocs, updateDoc, doc, increment };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuração Oficial das suas chaves do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCv-SYD0uIXd4N5st-TTyTHQYI8elBhqdc",
            authDomain: "star-cards-f36e9.firebaseapp.com",
            projectId: "star-cards-f36e9",
            storageBucket: "star-cards-f36e9.firebasestorage.app",
            messagingSenderId: "697398829358",
            appId: "1:697398829358:web:77bca1e1ec52b493f85abf"
        };

        // Inicialização segura
        let db = null;
        try {
            const app = window.FirebaseLib.initializeApp(firebaseConfig);
            db = window.FirebaseLib.getFirestore(app);
        } catch (e) {
            console.error("Erro ao conectar com o banco de dados:", e);
        }

        function App() {
            const [cartas, setCartas] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [carregando, setCarregando] = useState(true);
            const [filtroRaridade, setFiltroRaridade] = useState("Todas");

            const [novaCarta, setNovaCarta] = useState({
                nome: "", raridade: "Comum", poder: "", imagem: "", descricao: ""
            });

            // Lista padrão linda que serve de base para o seu clã
            const cartasPadrao = [
                { id: "1", nome: "Duda - A Líder", raridade: "Lendária", poder: 99, likes: 42, imagem: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500", descricao: "Fundadora e estrategista implacável do clã BRG Stars." },
                { id: "2", nome: "Bia - Atiradora", raridade: "Épica", poder: 88, likes: 29, imagem: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500", descricao: "Precisão absoluta e foco nos objetivos mais difíceis do servidor." },
                { id: "3", nome: "Kamille - Designer", raridade: "Mítica", poder: 95, likes: 37, imagem: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=500", descricao: "Mestra das interfaces visuais e criadora da identidade do grupo." }
            ];

            useEffect(() => {
                async function carregarDados() {
                    if (!db) {
                        setCartas(cartasPadrao);
                        setCarregando(false);
                        return;
                    }
                    try {
                        const querySnapshot = await window.FirebaseLib.getDocs(window.FirebaseLib.collection(db, "cartas"));
                        const listaCartas = [];
                        querySnapshot.forEach((doc) => {
                            listaCartas.push({ id: doc.id, ...doc.data() });
                        });
                        
                        if (listaCartas.length === 0) {
                            setCartas(cartasPadrao);
                        } else {
                            setCartas(listaCartas);
                        }
                    } catch (error) {
                        console.error("Erro ao buscar dados online:", error);
                        setCartas(cartasPadrao);
                    } finally {
                        setCarregando(false);
                    }
                }
                carregarDados();
            }, []);

            const darLike = async (id) => {
                setCartas(prev => prev.map(c => c.id === id ? { ...c, likes: (c.likes || 0) + 1 } : c));
                try {
                    if (db) {
                        const cartaRef = window.FirebaseLib.doc(db, "cartas", id);
                        await window.FirebaseLib.updateDoc(cartaRef, {
                            likes: window.FirebaseLib.increment(1)
                        });
                    }
                } catch (e) {
                    console.error("Erro ao computar curtida:", e);
                }
            };

            const salvarNovaCarta = async (e) => {
                e.preventDefault();
                if (!novaCarta.nome || !novaCarta.imagem) return alert("Preencha o nome e o link da foto!");

                const cartaParaAdicionar = {
                    nome: novaCarta.nome,
                    raridade: novaCarta.raridade,
                    poder: parseInt(novaCarta.poder) || 50,
                    imagem: novaCarta.imagem,
                    descricao: novaCarta.descricao || "Uma integrante misteriosa do clã.",
                    likes: 0
                };

                try {
                    if (db) {
                        const docRef = await window.FirebaseLib.addDoc(window.FirebaseLib.collection(db, "cartas"), cartaParaAdicionar);
                        setCartas(prev => [...prev, { id: docRef.id, ...cartaParaAdicionar }]);
                    } else {
                        setCartas(prev => [...prev, { id: Date.now().toString(), ...cartaParaAdicionar }]);
                    }
                    setNovaCarta({ nome: "", raridade: "Comum", poder: "", imagem: "", descricao: "" });
                    alert("Nova carta forjada no clã! 💎");
                } catch (err) {
                    alert("Erro ao salvar carta online.");
                }
            };

            const cartasFiltradas = cartas.filter(c => filtroRaridade === "Todas" || c.raridade === filtroRaridade);

            const obterCorRaridade = (raridade) => {
                switch(raridade) {
                    case "Lendária": return "border-amber-400 shadow-amber-500/20 text-amber-400 bg-amber-950/20";
                    case "Mítica": return "border-purple-500 shadow-purple-500/20 text-purple-400 bg-purple-950/20";
                    case "Épica": return "border-cyan-400 shadow-cyan-500/20 text-cyan-400 bg-cyan-950/20";
                    default: return "border-gray-600 shadow-black/40 text-gray-400 bg-gray-900/40";
                }
            };

            return (
                <div className="max-w-7xl mx-auto px-4 py-8">
                    {/* Cabeçalho */}
                    <header className="text-center mb-12 border-b border-purple-500/10 pb-8">
                        <span className="text-xs font-bold text-fuchsia-400 uppercase tracking-widest bg-fuchsia-950/40 px-4 py-1.5 rounded-full border border-fuchsia-500/20">
                            ✨ Arquivo de Integrantes Oficial
                        </span>
                        <h1 className="font-luxury text-5xl md:text-6xl font-black mt-4 bg-gradient-to-r from-yellow-200 via-fuchsia-400 to-purple-500 bg-clip-text text-transparent">
                            BRG STARS
                        </h1>
                        <p className="text-gray-400 text-sm mt-2 max-w-md mx-auto">
                            Exibição de poder, raridade e coleções de cartas exclusivas das integrantes do nosso clã.
                        </p>

                        {/* Botões de Filtro */}
                        <div className="flex flex-wrap justify-center gap-2 mt-8">
                            {["Todas", "Lendária", "Mítica", "Épica", "Comum"].map(rar => (
                                <button
                                    key={rar}
                                    onClick={() => setFiltroRaridade(rar)}
                                    className={`px-4 py-2 rounded-xl text-xs font-semibold tracking-wide transition border ${
                                        filtroRaridade === rar 
                                        ? "bg-fuchsia-600 text-white border-fuchsia-500 shadow-lg shadow-fuchsia-600/30" 
                                        : "bg-slate-900/60 text-gray-400 border-slate-800 hover:text-white"
                                    }`}
                                >
                                    {rar}
                                </button>
                            ))}
                            <button 
                                onClick={() => setIsAdmin(!isAdmin)}
                                className="px-4 py-2 rounded-xl text-xs font-bold tracking-wide bg-purple-950/40 border border-purple-500/30 text-purple-300 ml-4 hover:bg-purple-900/50"
                            >
                                {isAdmin ? "👁️ Modo Visão Geral" : "⚙️ Painel Admin"}
                            </button>
                        </div>
                    </header>

                    {/* Formulário Admin Ocultável */}
                    {isAdmin && (
                        <div className="bg-slate-900/80 border border-purple-500/20 p-6 rounded-3xl max-w-xl mx-auto mb-12 shadow-2xl backdrop-blur-sm">
                            <h2 className="font-luxury text-xl font-bold text-fuchsia-400 mb-4 flex items-center gap-2">
                                🔮 Forjar Nova Carta no Clã
                            </h2>
                            <form onSubmit={salvarNovaCarta} className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-[11px] font-bold text-gray-400 block mb-1">Nome da Integrante</label>
                                        <input type="text" value={novaCarta.nome} onChange={e => setNovaCarta({...novaCarta, nome: e.target.value})} className="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-sm focus:outline-none focus:border-fuchsia-500 text-white" placeholder="Ex: Ana - Suporte"/>
                                    </div>
                                    <div>
                                        <label className="text-[11px] font-bold text-gray-400 block mb-1">Nível de Raridade</label>
                                        <select value={novaCarta.raridade} onChange={e => setNovaCarta({...novaCarta, raridade: e.target.value})} className="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-sm focus:outline-none focus:border-fuchsia-500 text-white">
                                            <option value="Comum">Comum</option>
                                            <option value="Épica">Épica</option>
                                            <option value="Mítica">Mítica</option>
                                            <option value="Lendária">Lendária</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-[11px] font-bold text-gray-400 block mb-1">Pontos de Poder (0-99)</label>
                                        <input type="number" value={novaCarta.poder} onChange={e => setNovaCarta({...novaCarta, poder: e.target.value})} className="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-sm focus:outline-none focus:border-fuchsia-500 text-white" placeholder="95"/>
                                    </div>
                                    <div>
                                        <label className="text-[11px] font-bold text-gray-400 block mb-1">Link da Imagem (Foto)</label>
                                        <input type="text" value={novaCarta.imagem} onChange={e => setNovaCarta({...novaCarta, imagem: e.target.value})} className="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-sm focus:outline-none focus:border-fuchsia-500 text-white" placeholder="https://..."/>
                                    </div>
                                </div>
                                <div>
                                    <label className="text-[11px] font-bold text-gray-400 block mb-1">Descrição de Combate / Função</label>
                                    <textarea value={novaCarta.descricao} onChange={e => setNovaCarta({...novaCarta, descricao: e.target.value})} className="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-sm focus:outline-none focus:border-fuchsia-500 text-white h-20" placeholder="Descreva as habilidades ou lore da jogadora no clã..."></textarea>
                                </div>
                                <button type="submit" className="w-full bg-gradient-to-r from-fuchsia-600 to-purple-600 hover:from-fuchsia-500 hover:to-purple-500 font-bold p-3 rounded-xl text-sm transition shadow-lg shadow-fuchsia-600/20">
                                    Adicionar ao Álbum do Grupo 💎
                                </button>
                            </form>
                        </div>
                    )}

                    {/* Mostruário de Cartas */}
                    {carregando ? (
                        <div className="text-center text-gray-400 py-12 font-mono text-xs animate-pulse">
                            🔮 Abrindo baú cósmico de cartas...
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                            {cartasFiltradas.map((carta) => (
                                <div 
                                    key={carta.id} 
                                    className={`card-glow bg-slate-900/40 border p-4 rounded-3xl shadow-xl flex flex-col justify-between backdrop-blur-sm ${obterCorRaridade(carta.raridade)}`}
                                >
                                    <div>
                                        {/* Imagem com Badge de Raridade */}
                                        <div className="relative aspect-[4/5] rounded-2xl overflow-hidden shadow-inner border border-white/5 bg-slate-950">
                                            <img src={carta.imagem} alt={carta.nome} className="w-full h-full object-cover" />
                                            <span className="absolute top-3 right-3 bg-slate-950/80 backdrop-blur-md text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full border border-white/10">
                                                ★ {carta.raridade}
                                            </span>
                                            <div className="absolute bottom-3 left-3 bg-gradient-to-r from-purple-600 to-fuchsia-600 px-3 py-1 rounded-xl font-bold text-xs shadow-lg text-white">
                                                POW: {carta.poder}
                                            </div>
                                        </div>

                                        {/* Informações */}
                                        <h3 className="font-luxury text-xl font-bold mt-4 tracking-wide text-white">
                                            {carta.nome}
                                        </h3>
                                        <p className="text-xs text-gray-400 mt-2 leading-relaxed min-h-[36px]">
                                            {carta.descricao}
                                        </p>
                                    </div>

                                    {/* Footer com Likes */}
                                    <div className="mt-4 pt-4 border-t border-white/5 flex justify-between items-center">
                                        <span className="text-[11px] font-mono text-gray-500 uppercase tracking-widest">
                                            ID: #{carta.id.substring(0, 4)}
                                        </span>
                                        <button 
                                            onClick={() => darLike(carta.id)}
                                            className="flex items-center gap-2 bg-purple-950/60 hover:bg-fuchsia-950/60 border border-purple-500/20 hover:border-fuchsia-500/40 px-4 py-1.5 rounded-full text-xs font-bold transition text-fuchsia-300"
                                        >
                                            💖 <span>{carta.likes || 0}</span>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                    
                    {cartasFiltradas.length === 0 && !carregando && (
                        <div className="text-center text-gray-500 py-12 text-sm">
                            Nenhuma integrante encontrada com essa raridade no momento. 🌌
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
